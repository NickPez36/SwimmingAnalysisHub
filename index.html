<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swimming Analysis Hub</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (v18) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Recharts Dependencies -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    
    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Ensures the body takes up the full screen and hides scrollbars briefly on load */
        body { margin: 0; padding: 0; background-color: #f9fafb; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 1. Destructure Hooks and Components from the globally loaded libraries
        const { useState, useEffect, useMemo } = React;
        const { 
          ComposedChart, Line, Area, Bar, Scatter, ReferenceLine, 
          XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer 
        } = window.Recharts;

        // 2. Define Standalone SVG Icons (Replaces the 'lucide-react' dependency for static HTML compatibility)
        const Icon = ({ children, size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {children}
          </svg>
        );
        const Activity = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
        const Trophy = (p) => <Icon {...p}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></Icon>;
        const Timer = (p) => <Icon {...p}><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></Icon>;
        const TrendingUp = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
        const TableProperties = (p) => <Icon {...p}><path d="M15 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M21 9H3"/><path d="M21 15H3"/></Icon>;
        const Loader2 = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const Zap = (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
        const ArrowLeft = (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
        const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon>;
        const Target = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>;

        // --- Utility Functions ---

        const parseDate = (dateStr) => {
          if (!dateStr) return new Date(0);
          const parts = dateStr.split('/');
          if (parts.length === 3) {
            return new Date(parts[2], parts[1] - 1, parts[0]);
          }
          return new Date(dateStr); 
        };

        const parseTime = (timeStr) => {
          if (!timeStr) return null;
          const parts = timeStr.toString().trim().split(':');
          if (parts.length === 2) {
            return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
          }
          return parseFloat(timeStr);
        };

        const formatTime = (seconds) => {
          if (seconds == null || isNaN(seconds)) return '';
          const mins = Math.floor(seconds / 60);
          const secs = (seconds % 60).toFixed(2);
          if (mins > 0) {
            return `${mins}:${secs.padStart(5, '0')}`;
          }
          return secs;
        };

        const parseCSV = (csvText) => {
          const lines = csvText.split('\n').filter(line => line.trim().length > 0);
          if (lines.length < 2) return [];
          
          const headers = lines[0].split(',').map(h => h.trim());
          const data = [];
          
          for (let i = 1; i < lines.length; i++) {
            const values = lines[i].split(',').map(v => v.trim());
            const row = {};
            headers.forEach((header, index) => {
              row[header] = values[index];
            });
            data.push(row);
          }
          return data;
        };

        const calculateStats = (values) => {
          const validValues = values.filter(v => v != null && !isNaN(v));
          if (validValues.length === 0) return { mean: null, stdDev: null };
          
          const mean = validValues.reduce((sum, val) => sum + val, 0) / validValues.length;
          if (validValues.length === 1) return { mean, stdDev: 0 };
          
          const squareDiffs = validValues.map(value => Math.pow(value - mean, 2));
          const variance = squareDiffs.reduce((sum, val) => sum + val, 0) / validValues.length;
          const stdDev = Math.sqrt(variance);
          
          return { mean, stdDev };
        };

        // --- Main App Component ---

        function App() {
          const [rawData, setRawData] = useState([]);
          const [error, setError] = useState(null);
          const [isLoading, setIsLoading] = useState(false);
          
          const [currentView, setCurrentView] = useState('home'); 
          
          const [showVirtualBest, setShowVirtualBest] = useState(false);
          const [selectedDistance, setSelectedDistance] = useState('');
          const [selectedRaceId, setSelectedRaceId] = useState('none');

          useEffect(() => {
            const fetchFromGitHub = async () => {
              setIsLoading(true);
              setError(null);
              try {
                const repoUrl = 'https://api.github.com/repos/NickPez36/SwimmingAnalysisHub/contents/data';
                const response = await fetch(repoUrl);
                
                if (!response.ok) throw new Error('Could not connect to GitHub or find the "data" folder.');
                
                const files = await response.json();
                const csvFiles = files.filter(f => f.name.endsWith('.csv'));
                
                if (csvFiles.length === 0) throw new Error('No .csv files were found in the "data" folder.');

                const parsedFilesData = await Promise.all(
                  csvFiles.map(async (file) => {
                    const fileRes = await fetch(file.download_url);
                    if (!fileRes.ok) throw new Error(`Failed to fetch ${file.name}`);
                    const text = await fileRes.text();
                    return parseCSV(text);
                  })
                );
                
                const combinedData = parsedFilesData.flat();
                setRawData(combinedData);
                setSelectedRaceId('none');
              } catch (err) {
                setError(err.message);
                console.error(err);
              } finally {
                setIsLoading(false);
              }
            };

            fetchFromGitHub();
          }, []);

          const distances = useMemo(() => {
            const dists = new Set(rawData.map(row => row.Distance).filter(Boolean));
            const sortedDists = Array.from(dists).sort((a, b) => parseInt(a) - parseInt(b));
            if (sortedDists.length > 0 && !selectedDistance) {
              setSelectedDistance(sortedDists[0]);
            }
            return sortedDists;
          }, [rawData, selectedDistance]);

          const { races, chartData, pbTime, top5Avg } = useMemo(() => {
            if (!rawData.length || !selectedDistance) return { races: [], chartData: [], pbTime: null, top5Avg: null };

            let filteredRaces = rawData
              .map((row, index) => ({ ...row, originalIndex: index }))
              .filter(row => row.Distance === selectedDistance)
              .map(row => ({
                ...row,
                parsedDate: parseDate(row.Date),
                id: `${row.Date} - ${row.Meet} - ${row.originalIndex}`
              }))
              .sort((a, b) => b.parsedDate - a.parsedDate);

            if (filteredRaces.length === 0) return { races: [], chartData: [] };

            const splitPattern = /Split (\d+)m Individual/i;
            const allKeys = new Set();
            filteredRaces.forEach(r => Object.keys(r).forEach(k => allKeys.add(k)));
            
            const splitColumns = Array.from(allKeys)
              .map(col => {
                const match = col.match(splitPattern);
                return match ? { column: col, distance: parseInt(match[1], 10) } : null;
              })
              .filter(Boolean)
              .sort((a, b) => a.distance - b.distance);

            const recent5Races = filteredRaces.slice(0, 5);

            const overallTimes = filteredRaces.map(r => parseTime(r.Time)).filter(t => t !== null).sort((a,b) => a-b);
            const pbTime = overallTimes.length > 0 ? overallTimes[0] : null;
            const top5Overall = overallTimes.slice(0, 5);
            const top5Avg = top5Overall.length > 0 ? top5Overall.reduce((a,b) => a+b, 0) / top5Overall.length : null;

            const cData = splitColumns.map(split => {
              const dataPoint = { distance: `${split.distance}m`, distanceNum: split.distance };

              const recentTimes = recent5Races.map(race => parseTime(race[split.column])).filter(t => t !== null);
              const { mean, stdDev } = calculateStats(recentTimes);
              
              const allTimes = filteredRaces.map(race => parseTime(race[split.column])).filter(t => t !== null);
              const vBest = allTimes.length > 0 ? Math.min(...allTimes) : null;
              
              dataPoint.mean = mean;
              dataPoint.stdDev = stdDev;
              dataPoint.band = mean && stdDev !== null ? [mean - stdDev, mean + stdDev] : null;
              dataPoint.virtualBest = vBest !== Infinity ? vBest : null;

              filteredRaces.forEach(race => { dataPoint[race.id] = parseTime(race[split.column]); });
              return dataPoint;
            });

            return { races: filteredRaces, chartData: cData, pbTime, top5Avg };
          }, [rawData, selectedDistance]);

          const sprintTimelineData = useMemo(() => {
            if (selectedDistance !== '50' && selectedDistance !== '100') return [];
            return [...races].reverse().map(race => {
              const first50 = parseTime(race['Split 50m Individual']);
              const second50 = parseTime(race['Split 100m Individual']);
              const total = parseTime(race.Time);
              return {
                ...race, first50, second50, total,
                dropoff: (second50 && first50) ? (second50 - first50) : null,
                displayDate: race.Date
              };
            });
          }, [races, selectedDistance]);

          const csModelData = useMemo(() => {
            if (!rawData.length) return null;
            
            const csDistances = [200, 400, 800, 1500];
            const threeMonthsAgo = new Date();
            threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);

            let isOutdated = false;
            let validPoints = [];

            csDistances.forEach(dist => {
               const racesForDist = rawData.filter(r => parseInt(r.Distance) === dist && r.Time);
               if (racesForDist.length === 0) return;

               const recentRaces = racesForDist.filter(r => parseDate(r.Date) >= threeMonthsAgo);
               let pbRace;
               if (recentRaces.length > 0) {
                   pbRace = recentRaces.reduce((min, r) => parseTime(r.Time) < parseTime(min.Time) ? r : min);
               } else {
                   isOutdated = true; 
                   pbRace = racesForDist.reduce((min, r) => parseTime(r.Time) < parseTime(min.Time) ? r : min);
               }

               validPoints.push({
                   distance: dist,
                   time: parseTime(pbRace.Time),
                   date: pbRace.Date,
                   meet: pbRace.Meet,
                   isRecent: parseDate(pbRace.Date) >= threeMonthsAgo
               });
            });

            if (validPoints.length < 2) {
              return { error: "Not enough distance data. Critical Speed requires races across at least two distinct middle/long distances (e.g., 400m and 1500m).", isOutdated };
            }

            const n = validPoints.length;
            const sumX = validPoints.reduce((sum, p) => sum + p.time, 0);
            const sumY = validPoints.reduce((sum, p) => sum + p.distance, 0);
            const sumXY = validPoints.reduce((sum, p) => sum + (p.time * p.distance), 0);
            const sumXX = validPoints.reduce((sum, p) => sum + (p.time * p.time), 0);

            const csSlope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
            const dPrimeIntercept = (sumY - csSlope * sumX) / n;

            const maxTime = Math.max(...validPoints.map(p => p.time));
            const unifiedData = [
              { time: 0, trendDistance: Math.max(0, dPrimeIntercept) }, 
            ];
            
            validPoints.forEach(p => {
              unifiedData.push({
                time: p.time,
                actualDistance: p.distance,
                trendDistance: (p.time * csSlope) + dPrimeIntercept,
                date: p.date,
                meet: p.meet,
                isRecent: p.isRecent
              });
            });

            const extendTime = maxTime * 1.1;
            unifiedData.push({ time: extendTime, trendDistance: (extendTime * csSlope) + dPrimeIntercept });
            unifiedData.sort((a,b) => a.time - b.time);

            return {
              validPoints,
              unifiedData,
              cs: csSlope,
              dPrime: dPrimeIntercept,
              isOutdated
            };
          }, [rawData]);

          const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
              const selectedRacePayload = selectedRaceId !== 'none' ? payload.find(p => p.dataKey === selectedRaceId) : null;
              const meanPayload = payload.find(p => p.dataKey === 'mean');

              return (
                <div className="bg-white p-4 border border-gray-200 shadow-lg rounded-lg outline-none">
                  <p className="font-bold text-gray-800 border-b pb-2 mb-2">{label} Split</p>
                  {meanPayload && (
                    <div className="text-blue-600 mb-2"><span className="font-semibold">Profile Avg (Last 5):</span> {formatTime(meanPayload.value)}</div>
                  )}
                  {selectedRacePayload && (
                    <div className="text-orange-600 font-bold text-lg"><span>Selected Race:</span> {formatTime(selectedRacePayload.value)}</div>
                  )}
                  {showVirtualBest && payload.find(p => p.dataKey === 'virtualBest') && (
                    <div className="text-purple-600 font-bold mt-1 border-t pt-1"><span>Virtual Best:</span> {formatTime(payload.find(p => p.dataKey === 'virtualBest').value)}</div>
                  )}
                  {!selectedRacePayload && selectedRaceId === 'none' && (
                    <div className="text-gray-500 text-sm italic">Select a specific race from the dropdown to highlight its exact times here.</div>
                  )}
                </div>
              );
            }
            return null;
          };

          const Tooltip50m = ({ active, payload }) => {
            if (active && payload && payload.length) {
              const data = payload[0].payload;
              return (
                <div className="bg-white p-4 border border-gray-200 shadow-lg rounded-lg outline-none">
                  <p className="font-bold text-gray-800 border-b pb-2 mb-2">{data.Date} - {data.Meet}</p>
                  <div className="text-blue-600 font-bold text-lg">Final Time: {formatTime(data.total)}</div>
                </div>
              );
            }
            return null;
          };

          const Tooltip100m = ({ active, payload }) => {
            if (active && payload && payload.length) {
              const data = payload[0].payload;
              return (
                <div className="bg-white p-4 border border-gray-200 shadow-lg rounded-lg outline-none min-w-[200px]">
                  <p className="font-bold text-gray-800 border-b pb-2 mb-2">{data.Date} <br/><span className="text-sm font-normal text-gray-500">{data.Meet}</span></p>
                  <div className="text-gray-900 font-bold mb-2">Total Time: {formatTime(data.total)}</div>
                  <div className="text-blue-800 font-medium">1st 50m: {formatTime(data.first50)}</div>
                  <div className="text-blue-400 font-medium">2nd 50m: {formatTime(data.second50)}</div>
                  {data.dropoff !== null && (
                    <div className="text-orange-600 font-bold mt-2 pt-2 border-t">Drop-off Variance: +{formatTime(data.dropoff)}s</div>
                  )}
                </div>
              );
            }
            return null;
          };

          const CSTooltip = ({ active, payload }) => {
            if (active && payload && payload.length) {
              const data = payload[0].payload;
              if (data.actualDistance) {
                return (
                  <div className="bg-white p-4 border border-gray-200 shadow-lg rounded-lg outline-none max-w-xs">
                    <p className="font-bold text-gray-800 border-b pb-2 mb-2">{data.actualDistance}m PB <span className="text-sm font-normal text-gray-500 block">{data.date}</span></p>
                    <div className="text-orange-600 font-bold text-lg">Time: {formatTime(data.time)}</div>
                    <div className="text-gray-600 text-sm mt-1">{data.meet}</div>
                    {!data.isRecent && <div className="text-red-500 text-xs mt-2 font-semibold">Older than 3 months</div>}
                  </div>
                );
              }
            }
            return null;
          };

          const tableTotals = useMemo(() => {
            if (!chartData || chartData.length === 0) return null;
            let selectedRaceTotal = 0; let profileAvgTotal = 0; let virtualBestTotal = 0;
            chartData.forEach(row => {
              if (selectedRaceId !== 'none' && row[selectedRaceId]) selectedRaceTotal += row[selectedRaceId];
              if (row.mean) profileAvgTotal += row.mean;
              if (row.virtualBest) virtualBestTotal += row.virtualBest;
            });
            return { selectedRaceTotal, profileAvgTotal, virtualBestTotal };
          }, [chartData, selectedRaceId]);


          return (
            <div className="min-h-screen bg-gray-50 p-6 font-sans text-gray-900">
              <div className="max-w-6xl mx-auto space-y-6">
                
                {/* Global Header Section */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                  <div className="flex items-center gap-3">
                    <div className="p-3 bg-blue-100 text-blue-600 rounded-lg shadow-inner">
                      <Activity size={28} />
                    </div>
                    <div>
                      <h1 className="text-2xl font-bold text-gray-900">Swimming Analysis Hub</h1>
                      <p className="text-gray-500 text-sm">Advanced pacing and critical speed modelling</p>
                    </div>
                  </div>

                  <div className="flex-shrink-0 flex gap-3 flex-wrap">
                    {isLoading && (
                      <div className="flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-700 rounded-lg shadow-sm font-medium border border-blue-100">
                        <Loader2 size={18} className="animate-spin" />
                        <span>Fetching Latest Data...</span>
                      </div>
                    )}
                    {!isLoading && rawData.length > 0 && (
                      <div className="flex items-center gap-2 px-4 py-2 bg-green-50 text-green-700 rounded-lg shadow-sm font-medium border border-green-100">
                        <span className="relative flex h-3 w-3">
                          <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                          <span className="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                        </span>
                        <span>Live from GitHub</span>
                      </div>
                    )}
                  </div>
                </div>

                {error && (
                  <div className="bg-red-50 text-red-700 p-4 rounded-lg flex items-center gap-2 border border-red-200">
                    <AlertCircle size={20} />
                    {error}
                  </div>
                )}

                {/* Global Loading / No Data State */}
                {isLoading && rawData.length === 0 ? (
                  <div className="bg-white p-12 rounded-xl border border-dashed border-gray-300 flex flex-col items-center justify-center text-center text-gray-500">
                    <Loader2 size={48} className="animate-spin text-blue-500 mb-4" />
                    <h3 className="text-lg font-medium text-gray-900 mb-1">Loading Analytics</h3>
                    <p className="max-w-md mb-6">Fetching race datasets directly from your GitHub repository...</p>
                  </div>
                ) : rawData.length === 0 && !error && !isLoading ? (
                  <div className="bg-white p-12 rounded-xl border border-dashed border-gray-300 flex flex-col items-center justify-center text-center text-gray-500">
                    <Activity size={48} className="text-gray-300 mb-4" />
                    <h3 className="text-lg font-medium text-gray-900 mb-1">No Data Found</h3>
                    <p className="max-w-md mb-6">No .csv files were found in your GitHub repository.</p>
                  </div>
                ) : null}

                {/* --- VIEW ROUTER --- */}
                {rawData.length > 0 && !isLoading && (
                  <React.Fragment>
                    {/* VIEW: HOME (Landing Page Tiles) */}
                    {currentView === 'home' && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in fade-in duration-500">
                        
                        <div 
                          onClick={() => setCurrentView('split')}
                          className="bg-white p-8 rounded-xl shadow-sm border border-gray-100 hover:border-blue-300 hover:shadow-md cursor-pointer transition-all group flex flex-col h-full"
                        >
                          <div className="p-4 bg-blue-50 text-blue-600 rounded-full w-16 h-16 flex items-center justify-center mb-6 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                            <Timer size={32} />
                          </div>
                          <h2 className="text-2xl font-bold text-gray-800 mb-3">Historical & Pacing Analysis</h2>
                          <p className="text-gray-500 flex-grow">Analyze split pacing against a 5-race moving average. View historical timelines for sprints and deeply dissect multi-lap drop-offs.</p>
                          <div className="mt-6 font-semibold text-blue-600 flex items-center gap-2 group-hover:gap-3 transition-all">
                            Open Dashboard <span>→</span>
                          </div>
                        </div>

                        <div 
                          onClick={() => setCurrentView('cs')}
                          className="bg-white p-8 rounded-xl shadow-sm border border-gray-100 hover:border-orange-300 hover:shadow-md cursor-pointer transition-all group flex flex-col h-full"
                        >
                          <div className="p-4 bg-orange-50 text-orange-600 rounded-full w-16 h-16 flex items-center justify-center mb-6 group-hover:bg-orange-600 group-hover:text-white transition-colors">
                            <Zap size={32} />
                          </div>
                          <h2 className="text-2xl font-bold text-gray-800 mb-3">Critical Speed (CS) Model</h2>
                          <p className="text-gray-500 flex-grow">Determine aerobic and anaerobic thresholds (CS & D') by tracking the best times across 200m, 400m, 800m, and 1500m events.</p>
                          <div className="mt-6 font-semibold text-orange-600 flex items-center gap-2 group-hover:gap-3 transition-all">
                            Open Dashboard <span>→</span>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* VIEW: SPLIT & PACING ANALYSIS */}
                    {currentView === 'split' && (
                      <div className="space-y-6 animate-in slide-in-from-right-8 duration-300">
                        <button 
                          onClick={() => setCurrentView('home')}
                          className="flex items-center gap-2 text-gray-500 hover:text-blue-600 font-medium transition-colors mb-2"
                        >
                          <ArrowLeft size={18} /> Back to Hub
                        </button>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                          <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div className="p-3 bg-yellow-100 text-yellow-600 rounded-lg"><Trophy size={24} /></div>
                            <div>
                              <p className="text-sm font-semibold text-gray-500">Overall PB ({selectedDistance}m)</p>
                              <p className="text-2xl font-bold text-gray-900">{formatTime(pbTime) || '--'}</p>
                            </div>
                          </div>
                          <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div className="p-3 bg-green-100 text-green-600 rounded-lg"><Timer size={24} /></div>
                            <div>
                              <p className="text-sm font-semibold text-gray-500">Fastest 5 Average</p>
                              <p className="text-2xl font-bold text-gray-900">{formatTime(top5Avg) || '--'}</p>
                            </div>
                          </div>
                          <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                            <div className="p-3 bg-blue-100 text-blue-600 rounded-lg"><TrendingUp size={24} /></div>
                            <div>
                              <p className="text-sm font-semibold text-gray-500">Total Races Logged</p>
                              <p className="text-2xl font-bold text-gray-900">{races.length}</p>
                            </div>
                          </div>
                        </div>
                        
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-6 items-end">
                          <div className="w-full md:w-1/4 space-y-2">
                            <label className="block text-sm font-semibold text-gray-700">Event Distance</label>
                            <select 
                              className="w-full border-gray-300 border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                              value={selectedDistance}
                              onChange={(e) => setSelectedDistance(e.target.value)}
                            >
                              {distances.map(d => <option key={d} value={d}>{d}m</option>)}
                            </select>
                          </div>

                          {selectedDistance !== '50' && selectedDistance !== '100' && (
                            <React.Fragment>
                              <div className="w-full md:w-1/2 space-y-2 animate-in fade-in duration-300">
                                <label className="block text-sm font-semibold text-gray-700">Highlight Specific Race</label>
                                <select 
                                  className="w-full border-gray-300 border rounded-lg p-2.5 focus:ring-2 focus:orange-500 focus:border-orange-500 outline-none"
                                  value={selectedRaceId}
                                  onChange={(e) => setSelectedRaceId(e.target.value)}
                                >
                                  <option value="none">-- Plot all races equally --</option>
                                  {races.map((race, idx) => (
                                    <option key={race.id} value={race.id}>
                                      {race.Date} | {race.Meet} {race.Time ? `[${race.Time}]` : ''} {idx < 5 ? '(Used in Profile)' : ''}
                                    </option>
                                  ))}
                                </select>
                              </div>

                              <div className="w-full md:w-1/4 space-y-2 flex flex-col pb-2 animate-in fade-in duration-300">
                                <label className="flex items-center gap-3 cursor-pointer group">
                                  <div className="relative">
                                    <input type="checkbox" className="sr-only" checked={showVirtualBest} onChange={(e) => setShowVirtualBest(e.target.checked)} />
                                    <div className={`block w-12 h-7 rounded-full transition-colors ${showVirtualBest ? 'bg-purple-600' : 'bg-gray-300'}`}></div>
                                    <div className={`absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition-transform ${showVirtualBest ? 'transform translate-x-5' : ''}`}></div>
                                  </div>
                                  <span className="text-sm font-semibold text-gray-700 group-hover:text-purple-700 transition-colors">Show Virtual Best & Data</span>
                                </label>
                              </div>
                            </React.Fragment>
                          )}
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                          <div className="mb-4">
                            <h2 className="text-lg font-bold text-gray-800">
                              {selectedDistance === '50' ? '50m Historical Progression' :
                               selectedDistance === '100' ? '100m Pacing Breakdown (Stacked Splits)' : 
                               `${selectedDistance}m Race Profile (Individual Splits)`}
                            </h2>
                            <p className="text-sm text-gray-500">
                              {selectedDistance === '50' ? 'Timeline of final race times over the season. Orange dashed line represents Overall PB.' :
                               selectedDistance === '100' ? 'Hover over any race to view the deceleration drop-off variance between the 1st and 2nd 50m.' :
                               'The blue band represents the standard deviation around the mean (solid blue line) of the 5 most recent races.'}
                            </p>
                          </div>

                          <div className="h-[500px] w-full mt-6">
                            <ResponsiveContainer width="100%" height="100%">
                              {selectedDistance === '50' ? (
                                <ComposedChart data={sprintTimelineData} margin={{ top: 20, right: 30, left: 20, bottom: 20 }}>
                                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                                  <XAxis dataKey="displayDate" tick={{ fill: '#6B7280', fontSize: 11 }} tickMargin={10} />
                                  <YAxis domain={['dataMin - 1', 'dataMax + 1']} tickFormatter={formatTime} tick={{ fill: '#6B7280', fontSize: 12 }} label={{ value: 'Final Time', angle: -90, position: 'insideLeft', style: { fill: '#4B5563' } }} />
                                  <Tooltip content={<Tooltip50m />} />
                                  {pbTime && <ReferenceLine y={pbTime} stroke="#EA580C" strokeDasharray="5 5" strokeWidth={2} label={{ value: 'Overall PB', position: 'insideBottomRight', fill: '#EA580C', fontSize: 12, fontWeight: 'bold' }} />}
                                  <Line type="monotone" dataKey="total" stroke="#2563EB" strokeWidth={3} dot={{ r: 5, fill: '#2563EB', strokeWidth: 2, stroke: '#fff' }} activeDot={{ r: 7 }} name="Race Time" />
                                </ComposedChart>
                              ) : selectedDistance === '100' ? (
                                <ComposedChart data={sprintTimelineData} margin={{ top: 20, right: 30, left: 20, bottom: 20 }}>
                                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                                  <XAxis dataKey="displayDate" tick={{ fill: '#6B7280', fontSize: 11 }} tickMargin={10} angle={-45} textAnchor="end" height={60} />
                                  <YAxis domain={['auto', 'auto']} tickFormatter={formatTime} tick={{ fill: '#6B7280', fontSize: 12 }} label={{ value: 'Split Times (Stacked)', angle: -90, position: 'insideLeft', style: { fill: '#4B5563' } }} />
                                  <Tooltip content={<Tooltip100m />} cursor={{ fill: '#F3F4F6' }} />
                                  <Legend verticalAlign="top" height={36}/>
                                  <Bar dataKey="first50" stackId="a" fill="#1E40AF" name="1st 50m Split" radius={[0, 0, 4, 4]} />
                                  <Bar dataKey="second50" stackId="a" fill="#60A5FA" name="2nd 50m Split" radius={[4, 4, 0, 0]} />
                                  {pbTime && <ReferenceLine y={pbTime} stroke="#EA580C" strokeDasharray="5 5" strokeWidth={3} label={{ value: 'Overall PB', position: 'insideTopLeft', fill: '#EA580C', fontSize: 12, fontWeight: 'bold', offset: 10 }} />}
                                </ComposedChart>
                              ) : (
                                <ComposedChart data={chartData} margin={{ top: 20, right: 30, left: 20, bottom: 20 }}>
                                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                                  <XAxis dataKey="distance" tick={{ fill: '#6B7280', fontSize: 11 }} tickMargin={5} angle={-45} textAnchor="end" height={60} />
                                  <YAxis tickFormatter={formatTime} domain={['auto', 'auto']} tick={{ fill: '#6B7280', fontSize: 12 }} label={{ value: 'Split Time', angle: -90, position: 'insideLeft', offset: -5, style: { textAnchor: 'middle', fill: '#4B5563' } }} />
                                  <Tooltip content={<CustomTooltip />} />
                                  <Area type="monotone" dataKey="band" stroke="none" fill="#3B82F6" fillOpacity={0.15} name="Std Dev Band" />
                                  <Line type="monotone" dataKey="mean" stroke="#2563EB" strokeWidth={3} dot={{ r: 4, fill: '#2563EB', strokeWidth: 0 }} activeDot={{ r: 6 }} name="5-Race Average" />
                                  {showVirtualBest && <Line type="monotone" dataKey="virtualBest" stroke="#9333EA" strokeWidth={2} strokeDasharray="5 5" dot={{ r: 3, fill: '#9333EA', strokeWidth: 0 }} name="Virtual Best" />}
                                  {races.map(race => {
                                    const isSelected = selectedRaceId === race.id;
                                    const isHighlightedMode = selectedRaceId !== 'none';
                                    const strokeOpacity = isHighlightedMode ? (isSelected ? 1 : 0.15) : 0.5;
                                    const strokeColor = isSelected ? '#EA580C' : '#9CA3AF';
                                    const strokeWidth = isSelected ? 3 : 1.5;
                                    return (
                                      <Line key={race.id} type="monotone" dataKey={race.id} stroke={strokeColor} strokeWidth={strokeWidth} strokeOpacity={strokeOpacity} dot={isSelected ? { r: 5, fill: '#EA580C' } : false} activeDot={isSelected ? { r: 7 } : false} isAnimationActive={false} name={race.id} />
                                    );
                                  })}
                                </ComposedChart>
                              )}
                            </ResponsiveContainer>
                          </div>
                        </div>

                        {selectedDistance !== '50' && selectedDistance !== '100' && showVirtualBest && (
                          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 animate-in fade-in slide-in-from-bottom-4 duration-500">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><TableProperties size={20} className="text-purple-600"/> Split Data Comparison</h3>
                            <div className="overflow-auto max-h-[500px] border border-gray-200 rounded-lg relative">
                              <table className="w-full text-left border-collapse min-w-[600px]">
                                <thead className="bg-gray-50 sticky top-0 z-10 shadow-sm">
                                  <tr className="border-b border-gray-200">
                                    <th className="p-3 text-sm font-semibold text-gray-700 w-1/4">Distance</th>
                                    {selectedRaceId !== 'none' && <th className="p-3 text-sm font-semibold text-orange-600 w-1/4">Selected Race</th>}
                                    <th className="p-3 text-sm font-semibold text-blue-600 w-1/4">Profile Avg (Last 5)</th>
                                    <th className="p-3 text-sm font-semibold text-purple-700 w-1/4">Virtual Best</th>
                                  </tr>
                                </thead>
                                <tbody className="overflow-y-auto">
                                  {chartData.map((row, idx) => (
                                    <tr key={idx} className="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                      <td className="p-3 text-sm font-medium text-gray-900">{row.distance}</td>
                                      {selectedRaceId !== 'none' && <td className="p-3 text-sm font-bold text-orange-600">{formatTime(row[selectedRaceId]) || '--'}</td>}
                                      <td className="p-3 text-sm text-blue-700">{formatTime(row.mean) || '--'}</td>
                                      <td className="p-3 text-sm font-bold text-purple-700">{formatTime(row.virtualBest) || '--'}</td>
                                    </tr>
                                  ))}
                                </tbody>
                                <tfoot className="bg-gray-100 border-t-2 border-gray-300 sticky bottom-0 z-10 shadow-[0_-2px_4px_rgba(0,0,0,0.05)]">
                                  <tr>
                                    <td className="p-3 text-sm font-bold text-gray-900">Calculated Final Time</td>
                                    {selectedRaceId !== 'none' && <td className="p-3 text-sm font-bold text-orange-700">{formatTime(tableTotals?.selectedRaceTotal) || '--'}</td>}
                                    <td className="p-3 text-sm font-bold text-blue-800">{formatTime(tableTotals?.profileAvgTotal) || '--'}</td>
                                    <td className="p-3 text-sm font-bold text-purple-800">{formatTime(tableTotals?.virtualBestTotal) || '--'}</td>
                                  </tr>
                                </tfoot>
                              </table>
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    {/* VIEW: CRITICAL SPEED (CS) MODEL */}
                    {currentView === 'cs' && (
                      <div className="space-y-6 animate-in slide-in-from-right-8 duration-300">
                        <button 
                          onClick={() => setCurrentView('home')}
                          className="flex items-center gap-2 text-gray-500 hover:text-orange-600 font-medium transition-colors mb-2"
                        >
                          <ArrowLeft size={18} /> Back to Hub
                        </button>

                        {csModelData?.error ? (
                          <div className="bg-red-50 text-red-700 p-6 rounded-xl border border-red-200 flex flex-col items-center justify-center text-center">
                            <AlertCircle size={36} className="mb-4" />
                            <p className="font-semibold text-lg">{csModelData.error}</p>
                            <p className="mt-2 text-sm max-w-lg">Please ensure your GitHub repository has datasets uploaded for at least two of the middle/long distances (e.g. 400m and 1500m).</p>
                          </div>
                        ) : csModelData ? (
                          <React.Fragment>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                              <div className="bg-gradient-to-br from-orange-500 to-orange-600 p-6 rounded-xl shadow-md text-white">
                                <div className="flex items-center gap-3 mb-4">
                                  <Zap size={24} className="text-orange-100" />
                                  <h3 className="text-xl font-bold">Critical Speed (CS)</h3>
                                </div>
                                <p className="text-4xl font-extrabold mb-1">{csModelData.cs.toFixed(2)} <span className="text-xl font-medium text-orange-200">m/s</span></p>
                                <p className="text-sm text-orange-100 bg-orange-700/30 p-3 rounded-lg mt-4 border border-orange-400/30">
                                  <strong>What it means:</strong> The theoretical swimming speed that can be maintained continuously without exhaustion. It represents the aerobic threshold.
                                </p>
                              </div>

                              <div className="bg-gradient-to-br from-blue-600 to-blue-700 p-6 rounded-xl shadow-md text-white">
                                <div className="flex items-center gap-3 mb-4">
                                  <Target size={24} className="text-blue-200" />
                                  <h3 className="text-xl font-bold">D' (D-Prime)</h3>
                                </div>
                                <p className="text-4xl font-extrabold mb-1">{Math.round(csModelData.dPrime)} <span className="text-xl font-medium text-blue-200">meters</span></p>
                                <p className="text-sm text-blue-100 bg-blue-800/40 p-3 rounded-lg mt-4 border border-blue-500/30">
                                  <strong>What it means:</strong> The maximum distance capacity the swimmer can cover utilizing entirely anaerobic energy reserves above their Critical Speed.
                                </p>
                              </div>
                            </div>

                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                              <div className="mb-4">
                                <h2 className="text-lg font-bold text-gray-800">Distance vs Time Regression Model</h2>
                                <p className="text-sm text-gray-500">
                                  Plotting personal best times across standard distances to calculate the theoretical model.
                                </p>
                              </div>

                              <div className="h-[400px] w-full mt-6">
                                <ResponsiveContainer width="100%" height="100%">
                                  <ComposedChart data={csModelData.unifiedData} margin={{ top: 20, right: 30, left: 20, bottom: 20 }}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                                    <XAxis 
                                      type="number" 
                                      dataKey="time" 
                                      tickFormatter={formatTime} 
                                      domain={[0, 'dataMax']} 
                                      tick={{ fill: '#6B7280', fontSize: 12 }} 
                                      label={{ value: 'Race Time', position: 'insideBottom', offset: -10, style: { fill: '#4B5563' } }} 
                                    />
                                    <YAxis 
                                      type="number" 
                                      dataKey="trendDistance" 
                                      domain={[0, 'dataMax + 100']} 
                                      tick={{ fill: '#6B7280', fontSize: 12 }} 
                                      label={{ value: 'Distance (m)', angle: -90, position: 'insideLeft', style: { textAnchor: 'middle', fill: '#4B5563' } }} 
                                    />
                                    <Tooltip content={<CSTooltip />} cursor={{ strokeDasharray: '3 3' }} />
                                    <Legend verticalAlign="top" height={36}/>
                                    
                                    <Line 
                                      type="monotone" 
                                      dataKey="trendDistance" 
                                      stroke="#3B82F6" 
                                      strokeWidth={2} 
                                      strokeDasharray="5 5" 
                                      dot={false} 
                                      activeDot={false}
                                      name="Regression Trendline" 
                                      isAnimationActive={false}
                                    />
                                    <Scatter 
                                      dataKey="actualDistance" 
                                      fill="#EA580C" 
                                      name="Best Efforts (PB)" 
                                      shape="circle"
                                      isAnimationActive={false}
                                    />
                                  </ComposedChart>
                                </ResponsiveContainer>
                              </div>

                              {csModelData.isOutdated && (
                                <div className="mt-4 bg-amber-50 text-amber-800 p-4 rounded-lg flex items-start gap-3 border border-amber-200">
                                  <Info size={20} className="mt-0.5 flex-shrink-0" />
                                  <div className="text-sm">
                                    <span className="font-bold">Note: Outdated Data Points Included.</span><br/>
                                    There were not enough personal bests recorded within the previous 3 months for all distances. Older data was used as a fallback to complete the model. The CS and D' values shown may not accurately reflect current fitness levels.
                                  </div>
                                </div>
                              )}
                            </div>
                          </React.Fragment>
                        ) : null}
                      </div>
                    )}
                  </React.Fragment>
                )}
              </div>
            </div>
          );
        }

        // 4. Render the Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
